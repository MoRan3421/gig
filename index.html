<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NovaServe · 自由职业者平台 (2026创立) · 终极完整版+平台费归属</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
            transition: background-color 0.2s, color 0.2s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #475569;
            --border-light: #e2e8f0;
            --border-medium: #94a3b8;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --primary-soft: #eff6ff;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-card: 24px;
            --radius-btn: 40px;
            --header-height: 72px;
        }
        [data-theme="dark"] {
            --bg-body: #0b1120;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #e2e8f0;
            --text-tertiary: #cbd5e1;
            --border-light: #334155;
            --border-medium: #475569;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #1e3a8a;
            --primary-soft: #1e293b;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }
        body { background-color: var(--bg-body); color: var(--text-primary); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; width: 100%; }
        .header {
            height: var(--header-height);
            background-color: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            position: sticky; top: 0; z-index: 50;
        }
        [data-theme="dark"] .header { background-color: rgba(30,41,59,0.8); }
        .header-content { display: flex; align-items: center; justify-content: space-between; height: 100%; gap:16px; }
        .logo {
            display: flex; align-items: center; gap:10px; font-weight:700; font-size:1.5rem;
            color:var(--primary); cursor:pointer; flex-shrink:0;
        }
        .logo-icon {
            background:linear-gradient(145deg, var(--primary), #4f46e5);
            width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;
            color:white; font-size:1.4rem; box-shadow:var(--shadow-md);
        }
        .nav { display:flex; gap:4px; flex-wrap:wrap; }
        .nav-item {
            padding:8px 16px; border-radius:40px; font-weight:500; color:var(--text-secondary);
            transition:all 0.2s; cursor:pointer; font-size:0.95rem; white-space:nowrap;
        }
        .nav-item:hover { background-color:var(--bg-surface-hover); color:var(--primary); }
        .nav-item.active { background-color:var(--primary-light); color:var(--primary-dark); font-weight:600; }
        .search-wrapper {
            flex:0 1 360px; display:flex; align-items:center; background-color:var(--bg-surface);
            border:1px solid var(--border-light); border-radius:40px; padding:4px 4px 4px 20px;
            transition:all 0.2s;
        }
        .search-wrapper:focus-within { box-shadow:0 0 0 4px var(--primary-light); border-color:var(--primary); }
        .search-wrapper input {
            flex:1; border:none; background:transparent; padding:10px 0; font-size:0.95rem;
            outline:none; color:var(--text-primary); min-width:0;
        }
        .search-wrapper input::placeholder { color:var(--text-tertiary); opacity:0.8; }
        .search-wrapper button {
            background:var(--primary); border:none; color:white; width:42px; height:42px;
            border-radius:40px; display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:0.15s; flex-shrink:0;
        }
        .search-wrapper button:hover { background:var(--primary-dark); }
        .user-dropdown { position:relative; }
        .user-avatar {
            width:44px; height:44px; border-radius:44px; background:linear-gradient(145deg, var(--primary), #4f46e5);
            color:white; display:flex; align-items:center; justify-content:center; font-weight:600;
            font-size:1.1rem; cursor:pointer; border:2px solid var(--bg-surface); box-shadow:var(--shadow-sm);
        }
        .dropdown-menu {
            position:absolute; top:52px; right:0; background:var(--bg-surface); border:1px solid var(--border-light);
            border-radius:20px; box-shadow:var(--shadow-lg); width:240px; display:none; overflow:hidden; z-index:100;
        }
        .user-dropdown:hover .dropdown-menu { display:block; }
        .dropdown-item { padding:14px 20px; display:flex; align-items:center; gap:14px; color:var(--text-primary); cursor:pointer; transition:0.1s; font-size:0.95rem; }
        .dropdown-item i { width:22px; color:var(--text-tertiary); font-size:1.1rem; }
        .dropdown-item:hover { background-color:var(--bg-surface-hover); }
        .dropdown-item.logout { color:var(--danger); border-top:1px solid var(--border-light); }
        .btn {
            padding:12px 28px; border-radius:40px; font-weight:600; font-size:0.95rem; border:none;
            cursor:pointer; transition:0.15s; display:inline-flex; align-items:center; justify-content:center;
            gap:8px; background-color:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-light);
            white-space:nowrap;
        }
        .btn-primary { background:var(--primary); color:white; border:none; }
        .btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:var(--shadow-md); }
        .btn-outline { background:transparent; border:1px solid var(--border-medium); }
        .btn-outline:hover { background:var(--bg-surface-hover); }
        .btn-success { background:var(--success); color:white; border:none; }
        .btn-success:hover { background:#047857; }
        .btn-sm { padding:8px 16px; font-size:0.85rem; }
        .gig-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:24px; margin-top:20px; }
        .gig-card {
            background:var(--bg-surface); border-radius:20px; border:1px solid var(--border-light);
            overflow:hidden; transition:all 0.2s; cursor:pointer;
        }
        .gig-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--primary); }
        .gig-image { height:160px; background:linear-gradient(145deg, var(--primary-light), #e0e7ff); display:flex; align-items:center; justify-content:center; font-size:3rem; position:relative; }
        .gig-badge { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); color:white; padding:4px 12px; border-radius:40px; font-size:0.75rem; font-weight:600; }
        .gig-fav { position:absolute; top:12px; right:12px; background:var(--bg-surface); width:36px; height:36px; border-radius:36px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); box-shadow:var(--shadow-sm); transition:0.15s; cursor:pointer; z-index:2; }
        .gig-fav:hover { color:var(--danger); }
        .gig-fav.active { color:var(--danger); }
        .gig-content { padding:20px; }
        .gig-seller { display:flex; align-items:center; gap:8px; margin-bottom:12px; color:var(--text-secondary); font-size:0.9rem; }
        .seller-avatar-small { width:28px; height:28px; border-radius:28px; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:0.8rem; }
        .gig-title { font-weight:700; margin-bottom:12px; line-height:1.4; color:var(--text-primary); font-size:1.1rem; }
        .gig-footer { display:flex; align-items:center; justify-content:space-between; }
        .gig-rating i { color:#fbbf24; margin-right:4px; }
        .gig-price { font-weight:700; color:var(--primary); font-size:1.2rem; }
        .seller-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:24px; margin-top:20px; }
        .seller-card { background:var(--bg-surface); border-radius:20px; border:1px solid var(--border-light); padding:24px; transition:0.2s; }
        .seller-card:hover { box-shadow:var(--shadow-lg); border-color:var(--primary); }
        .seller-header { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
        .seller-avatar-large { width:64px; height:64px; border-radius:64px; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:600; flex-shrink:0; }
        .seller-meta h3 { margin-bottom:4px; color:var(--text-primary); font-size:1.2rem; }
        .seller-badge { display:inline-block; padding:2px 10px; background:var(--primary-light); color:var(--primary-dark); border-radius:40px; font-size:0.75rem; font-weight:600; }
        .seller-stats { display:flex; gap:16px; margin:16px 0; color:var(--text-secondary); }
        .seller-stats div { text-align:center; }
        .seller-stats strong { display:block; color:var(--text-primary); font-size:1.2rem; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin:30px 0; }
        .stat-card { background:var(--bg-surface); border:1px solid var(--border-light); border-radius:20px; padding:24px; display:flex; align-items:center; gap:20px; }
        .stat-icon { width:56px; height:56px; border-radius:16px; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
        .stat-card strong { font-size:1.5rem; color:var(--text-primary); }
        .invoice-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:20px; margin-top:20px; }
        .invoice-card { background:var(--bg-surface); border:1px solid var(--border-light); border-radius:20px; padding:24px; transition:0.2s; cursor:pointer; }
        .invoice-card:hover { box-shadow:var(--shadow-md); border-color:var(--primary); }
        .status-badge { display:inline-block; padding:4px 12px; border-radius:40px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
        .status-paid { background:#d1fae5; color:#065f46; }
        .status-pending { background:#fed7aa; color:#92400e; }
        .status-in-progress { background:#dbeafe; color:#1e40af; }
        .status-delivered { background:#d1fae5; color:#065f46; }
        .status-completed { background:#d1fae5; color:#065f46; }
        .status-cancelled { background:#fee2e2; color:#991b1b; }
        .status-disputed { background:#fee2e2; color:#991b1b; }
        .status-refunded { background:#fee2e2; color:#991b1b; }
        .status-reported { background:#dbeafe; color:#1e40af; }
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
            display:flex; align-items:center; justify-content:center; z-index:1000;
            opacity:0; visibility:hidden; transition:0.2s; padding:16px;
        }
        .modal-overlay.show { opacity:1; visibility:visible; }
        .modal-card {
            background:var(--bg-surface); border-radius:28px; max-width:500px; width:100%;
            max-height:90vh; overflow-y:auto; padding:32px; box-shadow:var(--shadow-lg);
            transform:scale(0.98); transition:0.2s;
        }
        .modal-overlay.show .modal-card { transform:scale(1); }
        .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
        .modal-header h2 { font-size:1.8rem; font-weight:700; color:var(--text-primary); }
        .modal-close { background:none; border:none; font-size:2rem; cursor:pointer; color:var(--text-tertiary); line-height:1; }
        .form-group { margin-bottom:20px; }
        .form-group label { font-weight:500; margin-bottom:6px; display:block; font-size:0.95rem; color:var(--text-secondary); }
        .form-control {
            width:100%; padding:14px 20px; border:1px solid var(--border-light); border-radius:40px;
            background:var(--bg-surface); color:var(--text-primary); font-size:1rem; outline:none; transition:0.15s;
        }
        .form-control:focus { border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-light); }
        textarea.form-control { border-radius:20px; resize:vertical; min-height:100px; }
        .tabs { display:flex; gap:8px; border-bottom:1px solid var(--border-light); margin-bottom:24px; flex-wrap:wrap; }
        .tab { padding:12px 24px; cursor:pointer; border-bottom:2px solid transparent; font-weight:500; color:var(--text-secondary); transition:0.15s; }
        .tab.active { color:var(--primary); border-bottom-color:var(--primary); }
        .cart-count, .notification-count { position:absolute; top:-5px; right:-5px; background:var(--danger); color:white; border-radius:20px; padding:2px 6px; font-size:0.7rem; min-width:18px; text-align:center; font-weight:600; }
        .cart-badge, .notification-badge { position:relative; }
        .footer { border-top:1px solid var(--border-light); padding:40px 0; margin-top:auto; color:var(--text-tertiary); }
        .two-column { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
        .three-column { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
        .four-column { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
        .industry-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:16px; }
        .industry-card { background:var(--bg-surface); border:1px solid var(--border-light); border-radius:16px; padding:20px; text-align:center; transition:0.2s; cursor:pointer; }
        .industry-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--primary); }
        .industry-icon { font-size:2.5rem; margin-bottom:8px; }
        .industry-name { font-weight:600; color:var(--text-primary); }
        .industry-count { font-size:0.85rem; color:var(--text-tertiary); }
        .industry-desc { font-size:0.8rem; color:var(--text-tertiary); margin-top:4px; }
        .badge-blue { background:var(--primary-light); color:var(--primary-dark); padding:4px 8px; border-radius:20px; font-size:0.7rem; font-weight:600; display:inline-block; }
        .badge-green { background:#d1fae5; color:#065f46; padding:4px 8px; border-radius:20px; display:inline-block; }
        .badge-yellow { background:#fed7aa; color:#92400e; padding:4px 8px; border-radius:20px; display:inline-block; }
        .badge-red { background:#fee2e2; color:#991b1b; padding:4px 8px; border-radius:20px; display:inline-block; }
        .code-card { background:var(--bg-surface); border:1px solid var(--border-light); border-radius:20px; padding:24px; margin-bottom:16px; font-family: 'Inter', monospace; }
        .api-tag { background:var(--primary-light); color:var(--primary-dark); padding:2px 8px; border-radius:20px; font-size:0.7rem; display:inline-block; }
        .sandbox-badge { background:var(--warning); color:#0f172a; padding:2px 10px; border-radius:40px; font-size:0.7rem; display:inline-block; }
        .owner-badge { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: #0f172a; padding: 4px 16px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .message-container { display: flex; height: 600px; background: var(--bg-surface); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-light); }
        .message-sidebar { width: 300px; border-right: 1px solid var(--border-light); overflow-y: auto; flex-shrink:0; }
        .message-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .message-header { padding:20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; gap:12px; }
        .message-list { flex:1; overflow-y:auto; padding:20px; }
        .message-item { display:flex; gap:12px; margin-bottom:20px; }
        .message-item.sent { justify-content:flex-end; }
        .message-bubble { max-width:70%; padding:12px 16px; border-radius:18px; word-wrap:break-word; }
        .message-item.sent .message-bubble { background:var(--primary); color:white; border-bottom-right-radius:4px; }
        .message-item.received .message-bubble { background:var(--bg-surface-hover); border-bottom-left-radius:4px; }
        .message-time { font-size:0.7rem; opacity:0.7; margin-top:4px; text-align:right; }
        .message-input-container { padding:20px; border-top:1px solid var(--border-light); display:flex; gap:12px; }
        .message-input { flex:1; border:1px solid var(--border-light); border-radius:40px; padding:12px 20px; outline:none; background:var(--bg-surface); color:var(--text-primary); }
        .message-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-light); }
        .conversation-item { padding:16px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:0.2s; }
        .conversation-item:hover { background:var(--bg-surface-hover); }
        .conversation-item.active { background:var(--primary-light); }
        .conversation-avatar { width:48px; height:48px; border-radius:48px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:1.2rem; color:var(--primary-dark); flex-shrink:0; }
        .unread-badge { background:var(--danger); color:white; border-radius:20px; padding:2px 8px; font-size:0.7rem; margin-left:8px; font-weight:600; display:inline-block; }
        .rating-stars i { color:#fbbf24; cursor:pointer; font-size:1.2rem; margin-right:4px; }
        .rating-stars i:hover { color:#f59e0b; }
        .progress-bar { width:100%; height:8px; background:var(--border-light); border-radius:4px; overflow:hidden; margin:8px 0; }
        .progress-fill { height:100%; background:var(--primary); border-radius:4px; }
        .category-strip { display:flex; gap:10px; overflow-x:auto; padding:12px 0; margin-bottom:20px; scrollbar-width:none; }
        .category-strip::-webkit-scrollbar { display:none; }
        .category-chip { padding:8px 22px; background:var(--bg-surface); border:1px solid var(--border-light); border-radius:40px; font-weight:500; font-size:0.9rem; white-space:nowrap; cursor:pointer; transition:0.15s; color:var(--text-secondary); }
        .category-chip:hover { background:var(--bg-surface-hover); }
        .category-chip.active { background:var(--primary); color:white; border-color:var(--primary); }
        .subscription-card { background:var(--bg-surface); border:1px solid var(--border-light); border-radius:20px; padding:24px; text-align:center; transition:0.2s; }
        .subscription-card.featured { border:2px solid var(--primary); position:relative; }
        .subscription-card.featured:before { content:'热门推荐'; position:absolute; top:-12px; left:50%; transform:translateX(-50%); background:var(--primary); color:white; padding:4px 16px; border-radius:40px; font-size:0.75rem; font-weight:600; }
        .achievement-badge { width:60px; height:60px; border-radius:60px; background:linear-gradient(145deg, #fbbf24, #f59e0b); display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem; margin:0 auto 12px; }
        .team-grid, .project-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:24px; margin-top:20px; }
        .chart-container { height:300px; margin:20px 0; position:relative; }
        .tax-badge { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .owner-fee-badge { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        @media (max-width:1024px) { .nav { display:none; } .search-wrapper { flex:1; } }
        @media (max-width:768px) { .two-column, .three-column, .four-column { grid-template-columns:1fr; } .message-sidebar { width:100%; border-right:none; border-bottom:1px solid var(--border-light); } .message-container { flex-direction:column; height:auto; } }
    </style>
</head>
